# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

release:
  mode: keep-existing

builds:
  - id: cheergo
    main: ./cmd/cheergo
    goos:
      - linux
    goarch:
      - amd64

checksum:
  algorithm: sha256

archives:
  - id: cheergo
    ids:
      - cheergo
    formats:
      - tar.gz
    files:
      - CHANGELOG.md
      - LICENSE
      - README.md
